<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, sans-serif; }

<body class="bg-neutral-100 text-neutral-600 min-h-screen flex flex-col">
  <!-- 顶部导航栏简化版 -->
  <header class="w-full bg-white nav-shadow">
    <div class="container mx-auto px-4 py-4 flex items-center">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl card-shadow p-8">
      <h1 class="text-3xl font-bold mb-8 text-blue-600 text-shadow text-center">联系我们</h1>
      <ul class="space-y-8">
        <li>

        <li>
          <div class="flex items-center mb-2 justify-center"><i class="fa fa-phone text-blue-600 mr-3"></i><h2 class="text-xl font-semibold">电话</h2></div>
          <p class="text-neutral-600 text-center">0718-7288888</p>
        </li>
        <li>
          <div class="flex items-center mb-2 justify-center"><i class="fa fa-envelope text-blue-600 mr-3"></i><h2 class="text-xl font-semibold">邮箱</h2></div>
          <p class="text-neutral-600 text-center">info@lichuantravel.com</p>
        </li>
        <li>
          <div class="flex items-center mb-2 justify-center"><i class="fa fa-weixin text-blue-600 mr-3"></i><h2 class="text-xl font-semibold">微信/公众号</h2></div>
          <p class="text-neutral-600 text-center">搜索“利川文旅”或扫码关注官方公众号</p>
        </li>
      </ul>
      <div class="text-center mt-10">
        <a href="../index.html" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg transition-all font-medium shadow-md inline-block"><i class="fa fa-home mr-2"></i>返回首页</a>
      </div>
    </div>
  </main>

  <footer class="bg-neutral-600 text-white py-8 mt-16">
    <div class="container mx-auto px-4 text-center">
      <div class="mb-4">
        <span class="font-bold">利川旅游指南</span> | 实用信息
      </div>
      <div class="text-neutral-300 text-sm">&copy; 2026 利川旅游指南. 保留所有权利.</div>
    </div>
  </footer>

</html>
