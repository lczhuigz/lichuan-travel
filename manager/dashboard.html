<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利川旅游 - 评价管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-neutral-100">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-map-signs text-[#165DFF] text-2xl"></i>
                <h1 class="text-xl font-bold text-neutral-600">利川旅游管理后台</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-neutral-500" id="admin-name">管理员</span>
                <button onclick="logout()" class="text-neutral-500 hover:text-[#165DFF]">
                    <i class="fa fa-sign-out"></i> 退出
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg p-6 shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-neutral-400 text-sm">总评价数</p>
                        <p class="text-2xl font-bold text-neutral-600" id="total-count">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fa fa-comments text-blue-500 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg p-6 shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-neutral-400 text-sm">待审核</p>
                        <p class="text-2xl font-bold text-yellow-600" id="pending-count">0</p>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <i class="fa fa-clock-o text-yellow-500 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg p-6 shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-neutral-400 text-sm">已通过</p>
                        <p class="text-2xl font-bold text-green-600" id="approved-count">0</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fa fa-check-circle text-green-500 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg p-6 shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-neutral-400 text-sm">平均评分</p>
                        <p class="text-2xl font-bold text-[#165DFF]" id="avg-rating">0.0</p>
                    </div>
                    <div class="bg-[#165DFF]/10 p-3 rounded-full">
                        <i class="fa fa-star text-[#165DFF] text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 标签页切换 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="border-b border-neutral-200">
                <nav class="flex -mb-px">
                    <button onclick="switchTab('pending')" id="tab-pending" class="px-6 py-3 text-[#165DFF] border-b-2 border-[#165DFF] font-medium">
                        待审核 <span id="pending-badge" class="ml-2 bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full text-xs">0</span>
                    </button>
                    <button onclick="switchTab('approved')" id="tab-approved" class="px-6 py-3 text-neutral-500 hover:text-[#165DFF] transition-colors">
                        已通过
                    </button>
                    <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-3 text-neutral-500 hover:text-[#165DFF] transition-colors">
                        已拒绝
                    </button>
                </nav>
            </div>
        </div>

        <!-- 批量操作栏 -->
        <div id="batch-actions" class="bg-white rounded-lg p-4 shadow mb-4 hidden">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-neutral-600">已选择 <span id="selected-count">0</span> 项</span>
                    <button onclick="batchApprove()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm transition-colors">
                        <i class="fa fa-check mr-2"></i>批量通过
                    </button>
                    <button onclick="batchReject()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm transition-colors">
                        <i class="fa fa-times mr-2"></i>批量拒绝
                    </button>
                </div>
                <button onclick="clearSelection()" class="text-neutral-400 hover:text-neutral-600">
                    <i class="fa fa-close"></i> 取消选择
                </button>
            </div>
        </div>

        <!-- 评价列表 -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div id="reviews-list" class="divide-y divide-neutral-200">
                <!-- 列表将通过JS动态加载 -->
            </div>
            
            <!-- 加载中 -->
            <div id="loading" class="text-center py-12 hidden">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#165DFF]"></div>
                <p class="text-neutral-500 mt-2">加载中...</p>
            </div>
            
            <!-- 无数据提示 -->
            <div id="no-data" class="text-center py-12 hidden">
                <i class="fa fa-inbox text-4xl text-neutral-300 mb-4"></i>
                <p class="text-neutral-500">暂无数据</p>
            </div>
            
            <!-- 分页 -->
            <div id="pagination" class="bg-white px-6 py-4 flex items-center justify-between border-t border-neutral-200 hidden">
                <div class="text-sm text-neutral-500">
                    第 <span id="current-page">1</span> / <span id="total-pages">1</span> 页
                </div>
                <div class="flex space-x-2">
                    <button onclick="changePage('prev')" id="prev-page" class="px-3 py-1 border border-neutral-300 rounded hover:bg-neutral-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        上一页
                    </button>
                    <button onclick="changePage('next')" id="next-page" class="px-3 py-1 border border-neutral-300 rounded hover:bg-neutral-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        下一页
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* 只有复选框需要自定义样式，因为 Tailwind 没有内置 checkbox 样式 */
        .checkbox-custom {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #d1d5db;
            border-radius: 0.25rem;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .checkbox-custom:checked {
            background-color: #165DFF;
            border-color: #165DFF;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .checkbox-custom:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.5);
        }
    </style>

    <script>
        // 当前状态
        let currentTab = 'pending';
        let currentPage = 1;
        let totalPages = 1;
        let selectedIds = new Set();
        let allReviews = [];

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            const auth = sessionStorage.getItem('adminAuth');
            if (!auth) {
                window.location.href = 'index.html';
                return;
            }
            
            loadStats();
            loadReviews();
        });

        // 获取认证头
        function getAuthHeader() {
            const auth = sessionStorage.getItem('adminAuth');
            return { 'Authorization': 'Basic ' + auth };
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: getAuthHeader()
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('total-count').textContent = result.data.total || 0;
                    document.getElementById('pending-count').textContent = result.data.pending || 0;
                    document.getElementById('approved-count').textContent = result.data.approved || 0;
                    document.getElementById('avg-rating').textContent = result.data.avg_rating || '0.0';
                    document.getElementById('pending-badge').textContent = result.data.pending || 0;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            selectedIds.clear();
            updateBatchActions();
            
            // 更新标签样式
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('border-[#165DFF]', 'text-[#165DFF]');
                el.classList.add('text-neutral-500');
            });
            document.getElementById(`tab-${tab}`).classList.add('border-[#165DFF]', 'text-[#165DFF]');
            
            loadReviews();
        }

        // 加载评价列表
        async function loadReviews() {
            const listEl = document.getElementById('reviews-list');
            const loadingEl = document.getElementById('loading');
            const noDataEl = document.getElementById('no-data');
            const paginationEl = document.getElementById('pagination');
            
            loadingEl.classList.remove('hidden');
            listEl.innerHTML = '';
            
            try {
                let url = '';
                if (currentTab === 'pending') {
                    url = '/api/admin/reviews/pending';
                } else {
                    url = `/api/admin/reviews/processed?status=${currentTab}&page=${currentPage}`;
                }
                
                const response = await fetch(url, {
                    headers: getAuthHeader()
                });
                const result = await response.json();
                
                loadingEl.classList.add('hidden');
                
                if (result.success) {
                    const reviews = currentTab === 'pending' ? result.data : result.data;
                    
                    if (reviews.length === 0) {
                        noDataEl.classList.remove('hidden');
                        paginationEl.classList.add('hidden');
                        return;
                    }
                    
                    noDataEl.classList.add('hidden');
                    
                    if (currentTab !== 'pending') {
                        totalPages = result.pagination.totalPages;
                        document.getElementById('current-page').textContent = currentPage;
                        document.getElementById('total-pages').textContent = totalPages;
                        paginationEl.classList.remove('hidden');
                        document.getElementById('prev-page').disabled = currentPage <= 1;
                        document.getElementById('next-page').disabled = currentPage >= totalPages;
                    } else {
                        paginationEl.classList.add('hidden');
                    }
                    
                    displayReviews(reviews);
                }
            } catch (error) {
                console.error('加载评价失败:', error);
                loadingEl.classList.add('hidden');
                alert('加载失败，请刷新重试');
            }
        }

        // 显示评价列表
        function displayReviews(reviews) {
            const listEl = document.getElementById('reviews-list');
            allReviews = reviews;
            
            let html = '';
            reviews.forEach(review => {
                const stars = generateStars(review.rating);
                const isSelected = selectedIds.has(review.id);
                
                html += `
                    <div class="p-6 hover:bg-neutral-50 transition-colors ${isSelected ? 'bg-[#165DFF]/5' : ''}">
                        <div class="flex items-start space-x-4">
                            <div class="pt-1">
                                <input type="checkbox" 
                                       onchange="toggleSelect(${review.id})"
                                       ${isSelected ? 'checked' : ''}
                                       class="checkbox-custom">
                            </div>
                            <div class="flex-1">
                                <div class="flex items-start justify-between mb-2">
                                    <div>
                                        <div class="flex items-center space-x-3">
                                            <h3 class="font-bold text-neutral-600">${review.name}</h3>
                                            <span class="text-sm text-neutral-400">${review.email}</span>
                                        </div>
                                        <div class="flex items-center space-x-3 mt-1">
                                            <div class="flex items-center space-x-1">
                                                ${stars}
                                            </div>
                                            <span class="text-sm text-neutral-400">${review.created_at}</span>
                                        </div>
                                        ${review.visited_place ? `
                                            <p class="text-sm text-[#165DFF] mt-2">📍 访问地点：${review.visited_place}</p>
                                        ` : ''}
                                    </div>
                                    <div class="flex items-center space-x-2">
                                        ${currentTab === 'pending' ? `
                                            <button onclick="approveReview(${review.id})" 
                                                    class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-sm transition-colors">
                                                <i class="fa fa-check mr-1"></i>通过
                                            </button>
                                            <button onclick="rejectReview(${review.id})" 
                                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm transition-colors">
                                                <i class="fa fa-times mr-1"></i>拒绝
                                            </button>
                                        ` : ''}
                                        <button onclick="deleteReview(${review.id})" 
                                                class="text-red-500 hover:text-red-600 p-1">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="bg-neutral-50 rounded-lg p-4 mt-3">
                                    <p class="text-neutral-600">${review.review_text}</p>
                                </div>
                                ${review.status ? `
                                    <p class="text-xs text-neutral-400 mt-2">
                                        审核时间：${review.updated_at || review.created_at}
                                    </p>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
        }

        // 生成星星
        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating 
                    ? '<i class="fa fa-star text-yellow-400"></i>'
                    : '<i class="fa fa-star-o text-neutral-300"></i>';
            }
            return stars;
        }

        // 选择/取消选择
        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateBatchActions();
            displayReviews(allReviews);
        }

        // 更新批量操作栏
        function updateBatchActions() {
            const batchActions = document.getElementById('batch-actions');
            const selectedCount = document.getElementById('selected-count');
            
            if (selectedIds.size > 0) {
                selectedCount.textContent = selectedIds.size;
                batchActions.classList.remove('hidden');
            } else {
                batchActions.classList.add('hidden');
            }
        }

        // 清除选择
        function clearSelection() {
            selectedIds.clear();
            updateBatchActions();
            displayReviews(allReviews);
        }

        // 批量通过
        async function batchApprove() {
            if (selectedIds.size === 0) return;
            await batchUpdateStatus('approved');
        }

        // 批量拒绝
        async function batchReject() {
            if (selectedIds.size === 0) return;
            await batchUpdateStatus('rejected');
        }

        // 批量更新状态
        async function batchUpdateStatus(status) {
            if (!confirm(`确定要${status === 'approved' ? '通过' : '拒绝'}选中的 ${selectedIds.size} 条评价吗？`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/admin/reviews/batch-status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeader()
                    },
                    body: JSON.stringify({
                        ids: Array.from(selectedIds),
                        status: status
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(result.message);
                    selectedIds.clear();
                    loadStats();
                    loadReviews();
                } else {
                    alert(result.message || '操作失败');
                }
            } catch (error) {
                alert('网络错误，请重试');
            }
        }

        // 通过单个评价
        async function approveReview(id) {
            if (!confirm('确定要通过这条评价吗？')) return;
            await updateStatus(id, 'approved');
        }

        // 拒绝单个评价
        async function rejectReview(id) {
            if (!confirm('确定要拒绝这条评价吗？')) return;
            await updateStatus(id, 'rejected');
        }

        // 更新评价状态
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`/api/admin/reviews/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeader()
                    },
                    body: JSON.stringify({ status })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(result.message);
                    loadStats();
                    loadReviews();
                } else {
                    alert(result.message || '操作失败');
                }
            } catch (error) {
                alert('网络错误，请重试');
            }
        }

        // 删除评价
        async function deleteReview(id) {
            if (!confirm('确定要删除这条评价吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`/api/admin/reviews/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeader()
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('删除成功');
                    loadStats();
                    loadReviews();
                } else {
                    alert(result.message || '删除失败');
                }
            } catch (error) {
                alert('网络错误，请重试');
            }
        }

        // 切换页码
        function changePage(direction) {
            if (direction === 'prev' && currentPage > 1) {
                currentPage--;
                loadReviews();
            } else if (direction === 'next' && currentPage < totalPages) {
                currentPage++;
                loadReviews();
            }
        }

        // 退出登录
        function logout() {
            sessionStorage.removeItem('adminAuth');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
